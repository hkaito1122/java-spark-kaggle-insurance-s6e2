# 内部のログレベル（Spark自体のエラーではなく、Log4jシステム自体のエラーレベル）
status = warn

# 全体のログレベルを INFO に設定し、出力先として「LogFile」を指定
rootLogger.level = info
rootLogger.appenderRef.file.ref = LogFile

# コンソール（画面）にも同時に出力したい場合は、以下の行の先頭の # を消してください
# rootLogger.appenderRef.console.ref = Console

# --- コンソール出力用アペンダーの設定 ---
appender.console.type = Console
appender.console.name = Console
appender.console.target = SYSTEM_ERR
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n

# --- ファイル出力用アペンダーの設定 ---
appender.file.type = File
appender.file.name = LogFile
# 出力先のディレクトリとファイル名を指定
appender.file.fileName = src/main/resources/log/execute.log
# 毎回上書きする設定 (false で上書き、true で追記)
appender.file.append = false
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n